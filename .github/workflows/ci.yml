name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Format Check
  # Verifies TypeScript compiles and bash scripts pass shellcheck.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check TypeScript compiles (analyze-results.ts)
        run: bun build --no-bundle tech-writer-eval/analyze-results.ts --outdir /tmp/ts-check

      - name: Shellcheck run.sh
        run: shellcheck tech-writer-eval/run.sh

      - name: Shellcheck execute-test.sh
        run: shellcheck tech-writer-eval/execute-test.sh

  # ---------------------------------------------------------------------------
  # Job 2: Dry-Run Validation
  # Runs run.sh --dry-run to verify pipeline configuration loads correctly,
  # and validates test-cases.json schema with jq type checks.
  # Does NOT execute any model calls.
  # ---------------------------------------------------------------------------
  dry-run:
    name: Dry-Run Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install shellcheck (for claudish stub prerequisite check)
        run: sudo apt-get install -y shellcheck

      # run.sh requires claudish to be on PATH even in --dry-run mode (dependency
      # check runs before the dry-run guard). Provide a no-op stub so CI passes
      # without actual API credentials.
      - name: Create claudish stub
        run: |
          sudo tee /usr/local/bin/claudish > /dev/null <<'EOF'
          #!/bin/bash
          echo "claudish stub: dry-run only, no execution" >&2
          exit 0
          EOF
          sudo chmod +x /usr/local/bin/claudish

      - name: Run pipeline dry-run
        run: ./tech-writer-eval/run.sh --dry-run

      - name: Validate test-cases.json — top-level keys present
        run: |
          jq -e 'type == "object"' tech-writer-eval/test-cases.json
          jq -e '.topic | type == "object"' tech-writer-eval/test-cases.json
          jq -e '.approaches | type == "array" and length > 0' tech-writer-eval/test-cases.json
          jq -e '.evaluation.criteria | type == "array" and length > 0' tech-writer-eval/test-cases.json
          jq -e '.judges | type == "array" and length > 0' tech-writer-eval/test-cases.json
          jq -e '.thresholds | type == "object"' tech-writer-eval/test-cases.json

      - name: Validate test-cases.json — criteria have required fields
        run: |
          jq -e '
            .evaluation.criteria | all(
              . | has("id") and has("name") and has("weight") and has("description")
              and (.weight | type == "number")
            )
          ' tech-writer-eval/test-cases.json

      - name: Validate test-cases.json — judges have required fields
        run: |
          jq -e '
            .judges | all(
              . | has("id") and has("model") and has("method")
            )
          ' tech-writer-eval/test-cases.json

      - name: Validate test-cases.json — total_weight is a positive number
        run: |
          jq -e '.evaluation.total_weight | type == "number" and . > 0' \
            tech-writer-eval/test-cases.json

  # ---------------------------------------------------------------------------
  # Job 3: Promptfoo Config Validation
  # Validates promptfoo YAML config and test-cases parse correctly.
  # Does NOT run actual evals (needs API keys).
  # ---------------------------------------------------------------------------
  promptfoo-validate:
    name: Promptfoo Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Validate promptfoo config
        run: promptfoo validate config -c skill-routing-eval/promptfooconfig.yaml

      - name: Verify test-cases.yaml has 20+ cases with assertions
        run: |
          # Convert YAML to JSON via promptfoo's bundled js-yaml, then validate
          npx js-yaml skill-routing-eval/test-cases.yaml > /tmp/test-cases.json
          node -e "
            const cases = require('/tmp/test-cases.json');
            if (!Array.isArray(cases)) throw new Error('Expected array');
            if (cases.length < 20) throw new Error('Expected 20+ cases, got ' + cases.length);
            const missing = cases.filter(c => !c.vars?.prompt || !c.assert?.length);
            if (missing.length) throw new Error(missing.length + ' cases missing vars.prompt or assert');
            console.log('test-cases.yaml: ' + cases.length + ' valid cases');
          "

      - name: Verify generated test-cases structure (if present)
        run: |
          if [ -f skill-routing-eval/generated/test-cases-generated.json ]; then
            node -e "
              const data = require('./skill-routing-eval/generated/test-cases-generated.json');
              if (!Array.isArray(data.test_cases)) throw new Error('Invalid structure');
              console.log('generated: ' + data.test_cases.length + ' cases');
            "
          else
            echo "No generated test cases — skipping"
          fi

  # ---------------------------------------------------------------------------
  # Job 4: Analyze Existing Results (tech-writer-eval)
  # Runs analyze-results.ts against the committed results directory (if any)
  # to confirm the analyzer doesn't crash on real data.
  # No API keys needed — this only reads static files.
  # ---------------------------------------------------------------------------
  analyze-existing:
    name: Analyze Existing Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Find latest result run
        id: find-run
        run: |
          LATEST=$(ls -dt tech-writer-eval/results/run-* 2>/dev/null | head -1)
          if [[ -n "$LATEST" && -f "$LATEST/sample-mapping.json" ]]; then
            echo "run_dir=$LATEST" >> "$GITHUB_OUTPUT"
            echo "has_results=true" >> "$GITHUB_OUTPUT"
            echo "Found result run: $LATEST"
          else
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            echo "No committed result runs found — skipping analyzer check."
          fi

      - name: Run analyzer on existing results
        if: steps.find-run.outputs.has_results == 'true'
        run: |
          bun tech-writer-eval/analyze-results.ts "${{ steps.find-run.outputs.run_dir }}"
