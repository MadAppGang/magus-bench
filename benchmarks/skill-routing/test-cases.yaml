# benchmarks/skill-routing/test-cases.yaml
#
# All test cases converted from:
#   - autotest/skills/test-cases.json      (8 skill routing tests)
#   - autotest/subagents/test-cases.json   (agent delegation tests)
#
# Groups:
#   explicit-skill        — user names a skill directly; must use Skill tool
#   implicit-skill        — user describes a need; routing table should surface the skill
#   agent-vs-skill        — disambiguation: a skill name must NOT become a Task subagent_type
#   spelling              — Bash commands after skill load must spell tool names correctly
#   mixed-routing         — one part uses Skill tool, another part delegates a Task agent
#   no-skill              — simple request handled directly, no skill invocation expected
#   explicit-delegation   — user names an agent explicitly; Task must use that agent
#   passive-routing       — implicit delegation via CLAUDE.md routing table
#   implicit-delegation   — complex task where the correct agent is implied
#   hinted-delegation     — prompt says "use a subagent" without naming one
#   direct-handling       — simple task, no Task call expected

# ---------------------------------------------------------------------------
# GROUP: explicit-skill
# ---------------------------------------------------------------------------

- description: "Explicit claudemem skill request should use Skill tool, not Task"
  metadata:
    id: skill-claudemem-explicit-01
    category: explicit-skill
    tags: [explicit, claudemem, skill-vs-agent]
    source: skills/test-cases.json
  vars:
    prompt: >
      Use the code-analysis:claudemem-search skill to understand how to search
      this codebase with claudemem. Just load the skill and report what commands
      are available. Do not actually run claudemem.
  assert:
    - type: contains
      value: "claudemem"
      metric: "mentions-claudemem"
    - type: llm-rubric
      value: >
        The response must invoke the Skill tool (not the Task or Agent tool) to
        load "code-analysis:claudemem-search". A Task call whose subagent_type
        is "code-analysis:claudemem-search" is a FAILURE. The response should
        describe claudemem commands without running them.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "correct-skill-tool-usage"

- description: "Explicit deep-analysis skill should be invoked via Skill tool"
  metadata:
    id: skill-deep-analysis-01
    category: explicit-skill
    tags: [explicit, deep-analysis, skill-vs-agent]
    source: skills/test-cases.json
  vars:
    prompt: >
      Use the code-analysis:deep-analysis skill to prepare a comprehensive
      analysis approach for the multimodel plugin. Just load the skill and
      explain the methodology it describes.
  assert:
    - type: contains
      value: "deep-analysis"
      metric: "mentions-deep-analysis"
    - type: llm-rubric
      value: >
        The response must invoke the Skill tool (not the Task or Agent tool) to
        load "code-analysis:deep-analysis". A Task call with subagent_type
        "code-analysis:deep-analysis" is a FAILURE. The response should
        summarise the methodology described by the skill.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "correct-skill-tool-usage"

- description: "Architect-detective skill should be invoked via Skill tool, not as Task agent"
  metadata:
    id: skill-architect-detective-01
    category: explicit-skill
    tags: [explicit, architect, skill-vs-agent]
    source: skills/test-cases.json
  vars:
    prompt: >
      Use the code-analysis:architect-detective skill to understand the
      architecture investigation methodology. Load the skill and summarise what
      claudemem commands it recommends for architecture analysis.
  assert:
    - type: contains
      value: "architect"
      metric: "mentions-architect"
    - type: not-contains
      value: "clademem"
      metric: "no-claudemem-typo"
    - type: llm-rubric
      value: >
        The response must invoke the Skill tool (not the Task or Agent tool) to
        load "code-analysis:architect-detective". A Task call with
        subagent_type "code-analysis:architect-detective" is a FAILURE. Any
        Bash commands that reference claudemem must spell it correctly
        ("claudemem", not "clademem" or any other variant).
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "correct-skill-tool-usage"

# ---------------------------------------------------------------------------
# GROUP: implicit-skill
# ---------------------------------------------------------------------------

- description: "Implicit claudemem need should invoke skill from routing table, not try as Task agent"
  metadata:
    id: skill-claudemem-implicit-01
    category: implicit-skill
    tags: [implicit, claudemem, routing-table]
    source: skills/test-cases.json
  vars:
    prompt: >
      I need to search this codebase semantically using claudemem to find all
      authentication-related code. First load the appropriate skill, then
      explain what claudemem commands I should use.
  assert:
    - type: contains
      value: "claudemem"
      metric: "mentions-claudemem"
    - type: llm-rubric
      value: >
        The response must recognise that "claudemem" implies the
        code-analysis:claudemem-search skill and invoke it via the Skill tool
        (not Task). A Task call whose subagent_type contains "claudemem" is a
        FAILURE. The response should then explain the relevant claudemem
        commands.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "routing-table-honored"

# ---------------------------------------------------------------------------
# GROUP: agent-vs-skill  (disambiguation)
# ---------------------------------------------------------------------------

- description: "claudemem-search must never appear as a Task subagent_type"
  metadata:
    id: skill-not-agent-01
    category: agent-vs-skill
    tags: [disambiguation, agent-vs-skill]
    source: skills/test-cases.json
  vars:
    prompt: >
      I need semantic code search capabilities. Use claudemem to map the
      architecture of the plugins directory. Load the appropriate skill first.
  assert:
    - type: contains
      value: "claudemem"
      metric: "mentions-claudemem"
    - type: llm-rubric
      value: >
        The response must load the claudemem-related skill via the Skill tool.
        It must NOT create a Task whose subagent_type is "claudemem-search" or
        "code-analysis:claudemem-search" — that would be treating a skill as
        an agent, which is incorrect.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "skill-not-treated-as-agent"

# ---------------------------------------------------------------------------
# GROUP: spelling
# ---------------------------------------------------------------------------

- description: "After loading claudemem skill, Bash commands must spell 'claudemem' correctly"
  metadata:
    id: skill-spelling-bash-01
    category: spelling
    tags: [spelling, claudemem, bash]
    source: skills/test-cases.json
  vars:
    prompt: >
      Load the code-analysis:claudemem-search skill, then run
      'which claudemem' and 'claudemem --version' to check if claudemem is
      installed.
  assert:
    - type: contains
      value: "claudemem"
      metric: "correct-spelling-present"
    - type: not-contains
      value: "clademem"
      metric: "no-typo-clademem"
    - type: llm-rubric
      value: >
        The response must load the skill via the Skill tool. Any Bash tool
        calls must spell "claudemem" correctly in every occurrence — the
        common typo "clademem" (missing the second 'u') is a FAILURE.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "correct-spelling"

# ---------------------------------------------------------------------------
# GROUP: mixed-routing
# ---------------------------------------------------------------------------

- description: "Detective agent for investigation; claudemem skill for search tool guidance"
  metadata:
    id: skill-routing-detective-01
    category: mixed-routing
    tags: [detective, claudemem, mixed]
    source: skills/test-cases.json
  vars:
    prompt: >
      Investigate the hook system in this codebase. If you need claudemem for
      searching, load the claudemem-search skill first. Use the detective agent
      for the actual investigation.
  assert:
    - type: contains
      value: "detective"
      metric: "mentions-detective"
    - type: llm-rubric
      value: >
        The response should delegate to the code-analysis:detective agent via a
        Task call for the investigation. If it also needs claudemem guidance, it
        should load code-analysis:claudemem-search via the Skill tool (not a
        Task). A Task call whose subagent_type is a skill name is a FAILURE.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "correct-mixed-routing"

# ---------------------------------------------------------------------------
# GROUP: no-skill
# ---------------------------------------------------------------------------

- description: "Simple file read should be handled directly — no skill invocation"
  metadata:
    id: skill-simple-no-skill-01
    category: no-skill
    tags: [simple, direct, no-skill]
    source: skills/test-cases.json
  vars:
    prompt: >
      Read the file plugins/code-analysis/plugin.json and tell me what agents
      are registered.
  assert:
    - type: not-contains
      value: "Skill("
      metric: "no-skill-call"
    - type: llm-rubric
      value: >
        This is a simple file-read task. The response should read the file
        directly and list the agents. It should NOT invoke any Skill tool or
        Task/Agent tool — direct handling is expected.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "direct-handling"

# ---------------------------------------------------------------------------
# GROUP: explicit-delegation
# ---------------------------------------------------------------------------

- description: "Explicit dev:researcher request should be honored"
  metadata:
    id: explicit-researcher-01
    category: explicit-delegation
    tags: [explicit, named, research]
    source: subagents/test-cases.json
  vars:
    prompt: >
      Use the dev:researcher agent to search the web for the latest React
      Server Components patterns and write a comprehensive research report to
      ai-docs/research-rsc.md
  assert:
    - type: contains
      value: "researcher"
      metric: "mentions-researcher"
    - type: llm-rubric
      value: >
        The response must create a Task call with subagent_type "dev:researcher"
        (or equivalent). Handling the research directly without delegating is a
        FAILURE because the user explicitly named an agent.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "explicit-agent-honored"

- description: "Explicit code-analysis:detective request should be honored"
  metadata:
