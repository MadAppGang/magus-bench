# ---------------------------------------------------------------------------
# GROUP: passive-routing  (CLAUDE.md routing table triggers delegation)
# ---------------------------------------------------------------------------

- description: "Complex research task — CLAUDE.md routing table should trigger dev:researcher"
  metadata:
    id: delegate-research-01
    category: passive-routing
    tags: [research, complex, web, routing-table]
    source: subagents/test-cases.json
  vars:
    prompt: >
      I need a comprehensive deep-dive research report on modern authentication
      patterns including OAuth 2.1, passkeys, and WebAuthn. Search the web for
      recent developments, compare approaches, assess security tradeoffs, and
      write a detailed findings document to ai-docs/auth-research.md
  assert:
    - type: llm-rubric
      value: >
        This is a complex web-research task. The response should delegate to
        the dev:researcher agent via a Task call. Handling the research directly
        without delegation is the most common failure. Using a generic
        general-purpose agent when a specialist is available is acceptable but
        not ideal.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "passive-routing-triggered"

- description: "Substantial implementation task — CLAUDE.md routing table should trigger dev:developer"
  metadata:
    id: delegate-implement-01
    category: passive-routing
    tags: [implementation, complex, routing-table]
    source: subagents/test-cases.json
  vars:
    prompt: >
      Implement a complete caching layer for our plugin system: create a cache
      manager class, add LRU eviction, implement cache invalidation hooks, add
      comprehensive tests, and ensure all linting passes. This is a substantial
      feature implementation.
  assert:
    - type: llm-rubric
      value: >
        This is a substantial implementation task. The response should delegate
        to the dev:developer agent via a Task call. Implementing everything
        inline without delegation is a FAILURE for this scale of task. Using a
        general-purpose agent is suboptimal but not a hard failure.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "passive-routing-triggered"

# ---------------------------------------------------------------------------
# GROUP: implicit-delegation
# ---------------------------------------------------------------------------

- description: "Deep codebase investigation should be delegated to code-analysis:detective"
  metadata:
    id: delegate-investigate-01
    category: implicit-delegation
    tags: [investigation, complex, codebase]
    source: subagents/test-cases.json
  vars:
    prompt: >
      I need you to do a thorough investigation of how the entire plugin system
      works in this codebase — trace the loading mechanism, understand the
      namespace resolution, find all integration points, and document the
      architecture. This is a deep-dive investigation that will require
      examining many files.
  assert:
    - type: llm-rubric
      value: >
        This is a deep, multi-file investigation. The response should delegate
        to code-analysis:detective via a Task call. Handling it inline without
        delegation is a FAILURE given the stated scope. The Explore subagent is
        a marginal acceptable alternative; a general-purpose agent is
        suboptimal.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "implicit-delegation-triggered"

# ---------------------------------------------------------------------------
# GROUP: hinted-delegation  (prompt says "use a subagent" without naming one)
# ---------------------------------------------------------------------------

- description: "Memory-leak debug with 'use a subagent' hint should delegate to dev:debugger"
  metadata:
    id: delegate-debug-01
    category: hinted-delegation
    tags: [hint, debugging, complex]
    source: subagents/test-cases.json
  vars:
    prompt: >
      There's a memory leak in our application that only manifests after
      processing 1000+ requests. Use a subagent to investigate the root cause —
      check for unclosed connections, leaked event listeners, and circular
      references across the codebase.
  assert:
    - type: llm-rubric
      value: >
        The prompt explicitly asks to use a subagent. The response must create a
        Task call. The ideal agent is dev:debugger; code-analysis:detective is
        an acceptable alternative. NOT creating a Task call is a FAILURE because
        the user explicitly requested subagent delegation.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "hinted-delegation-honored"

- description: "Parallel research with 'separate subagents' hint should spawn multiple Tasks"
  metadata:
    id: delegate-parallel-01
    category: hinted-delegation
    tags: [hint, parallel, research, multi-agent]
    source: subagents/test-cases.json
  vars:
    prompt: >
      Research these three topics in parallel using separate subagents:
      (1) GraphQL vs REST performance benchmarks,
      (2) WebSocket scaling patterns,
      (3) Edge computing for API gateways.
      Each subagent should write findings to a separate file.
  assert:
    - type: llm-rubric
      value: >
        The prompt explicitly asks for separate subagents in parallel. The
        response should create multiple Task calls (ideally 3, one per topic),
        each with a dev:researcher or general-purpose agent. Using a single Task
        for all topics is a FAILURE. Doing the research inline without any Task
        call is also a FAILURE.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "parallel-delegation-honored"

- description: "Subagent hint for codebase review should trigger delegation"
  metadata:
    id: hint-subagent-01
    category: hinted-delegation
    tags: [hint, review]
    source: subagents/test-cases.json
  vars:
    prompt: >
      Launch a subagent to comprehensively review all agent definitions across
      every plugin in this repository and generate a quality report comparing
      their description effectiveness
  assert:
    - type: llm-rubric
      value: >
        The prompt explicitly says "launch a subagent". The response must create
        a Task call. Ideal agents: agentdev:reviewer or code-analysis:detective.
        A general-purpose agent is acceptable. NOT delegating is a FAILURE.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "hinted-delegation-honored"

- description: "Background security scan hint should delegate via Task"
  metadata:
    id: hint-subagent-02
    category: hinted-delegation
    tags: [hint, background, security]
    source: subagents/test-cases.json
  vars:
    prompt: >
      Run a background subagent to scan the entire codebase for security
      vulnerabilities including hardcoded secrets, SQL injection patterns, and
      XSS vectors. Write the report to ai-docs/security-audit.md
  assert:
    - type: contains
      value: "security"
      metric: "mentions-security"
    - type: llm-rubric
      value: >
        The prompt requests a background subagent. The response must create a
        Task call. Acceptable agents: general-purpose, code-analysis:detective,
        dev:researcher, or dev:audit. Running the scan inline without a Task
        call is a FAILURE.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "hinted-delegation-honored"

# ---------------------------------------------------------------------------
# GROUP: direct-handling  (simple tasks; NO Task call expected)
# ---------------------------------------------------------------------------

- description: "Simple version-number lookup should be handled directly"
  metadata:
    id: direct-simple-01
    category: direct-handling
    tags: [simple, quick]
    source: subagents/test-cases.json
  vars:
    prompt: "What is the version number in plugins/dev/plugin.json?"
  assert:
    - type: llm-rubric
      value: >
        This is a trivially simple file-read question. The response should read
        the file directly and state the version number. Creating a Task call for
        something this simple is unnecessary overhead and counts as a FAILURE.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "direct-handling"

- description: "Simple file-search should be handled directly"
  metadata:
    id: direct-simple-02
    category: direct-handling
    tags: [simple, search]
    source: subagents/test-cases.json
  vars:
    prompt: "Find all files named plugin.json in this project"
  assert:
    - type: contains
      value: "plugin.json"
      metric: "mentions-plugin-json"
    - type: llm-rubric
      value: >
        This is a simple glob/find task. The response should list the files
        directly. Delegating to a Task agent for a task this simple is
        unnecessary and counts as a FAILURE. Using the Explore tool is a
        marginal acceptable alternative.
      provider: anthropic:messages:claude-sonnet-4-6
      metric: "direct-handling"
